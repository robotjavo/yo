<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>

<style>
body {
    margin: 0;
    background: linear-gradient(to top, #fff9c4, #ffe082);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* SOBRE */
.sobre {
    position: absolute;
    width: 220px;
    height: 160px;
    background: #ffca28;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    border-radius: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    animation: latido 1.5s infinite;
}

@keyframes latido {
    0%,100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.1); }
}

/* CONTENIDO */
.contenido {
    display: none;
    height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center; /* CENTRADO VERTICAL */
    align-items: center;     /* CENTRADO HORIZONTAL */
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
}

/* TEXTO */
h1 {
    color: #ffb300;
    font-size: 2.5em;
}

p {
    font-size: 1.2em;
    color: #6d4c41;
    max-width: 400px;
}

/* GALERÍA */
.galeria {
    margin-top: 20px;
    display: flex;
    gap: 10px;
}

.galeria img {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 10px;
}

/* FLORES */
.flower {
    position: absolute;
    font-size: 2em;
    animation: caer 10s linear infinite;
}

@keyframes caer {
    0% { transform: translateY(-100px); }
    100% { transform: translateY(100vh); }
}
</style>

</head>
<body>

<!-- SOBRE -->
<div class="sobre" onclick="abrirCarta()">
💌 Ábreme
</div>

<!-- CONTENIDO -->
<div class="contenido" id="contenido">
    <h1>🌼 Para ti 🌼</h1>

    <p>
        No tuve dinero para comprarte flores amarillas...<br><br>
        pero hice esto para ti 💛<br><br>
        Porque eres alguien muy especial 🌼
    </p>

    <!-- FOTOS -->
    <div class="galeria">
        <img src="https://picsum.photos/200?1">
        <img src="https://picsum.photos/200?2">
        <img src="https://picsum.photos/200?3">
    </div>

    <p style="margin-top:20px; font-size:0.9em;">
        💛 Toca la pantalla para escuchar la canción
    </p>
</div>

<!-- FLORES -->
<div class="flower" style="left:10%;">🌼</div>
<div class="flower" style="left:30%; animation-delay:2s;">🌼</div>
<div class="flower" style="left:50%; animation-delay:4s;">🌼</div>
<div class="flower" style="left:70%; animation-delay:1s;">🌼</div>
<div class="flower" style="left:90%; animation-delay:3s;">🌼</div>

<!-- MÚSICA -->
<iframe id="player" width="0" height="0"
src=""
frameborder="0" allow="autoplay"></iframe>

<script>
function abrirCarta() {
    document.querySelector(".sobre").style.display = "none";
    document.getElementById("contenido").style.display = "flex";
}

// música al tocar pantalla
document.body.addEventListener("click", function () {
    let player = document.getElementById("player");
    if (!player.src) {
        player.src = "https://www.youtube.com/embed/p_1Osm5xE5Y?autoplay=1&loop=1&playlist=p_1Osm5xE5Y";
    }
});
</script>

</body>
</html>
