<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>

<style>
body {
    margin: 0;
    background: linear-gradient(to top, #fff9c4, #ffe082);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* SOBRE */
.sobre {
    position: fixed; /* cubre toda la pantalla */
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;

    background: linear-gradient(to top, #ffca28, #ffc107);

    display: flex;
    justify-content: center;
    align-items: center;

    font-size: 2em;
    font-weight: bold;
    cursor: pointer;

    z-index: 9999; /* siempre encima */
}

    .oculto {
    animation: desaparecer 1s forwards;
}

@keyframes desaparecer {
    from { opacity: 1; }
    to { opacity: 0; }
}

@keyframes latido {
    0%,100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.1); }
}

/* CONTENIDO */
.contenido {
    display: none;
    height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center; /* CENTRADO VERTICAL */
    align-items: center;     /* CENTRADO HORIZONTAL */
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
}

/* TEXTO */
h1 {
    color: #ffb300;
    font-size: 2.5em;
}

p {
    font-size: 1.2em;
    color: #6d4c41;
    max-width: 400px;
}

/* GALERÍA */
.galeria {
    margin-top: 20px;
    display: flex;
    gap: 10px;
}

.galeria img {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 10px;
}

/* FLORES */
.flower {
    position: absolute;
    font-size: 2em;
    animation: caer 10s linear infinite;
}

@keyframes caer {
    0% { transform: translateY(-100px); }
    100% { transform: translateY(100vh); }
}
</style>

</head>
<body>

<!-- SOBRE -->
<div class="sobre" onclick="abrirCarta()">
💌 Ábreme
</div>

<!-- CONTENIDO -->
<div class="contenido" id="contenido">
    <h1>🌼 Para ti 🌼</h1>

    <p>
        No tuve dinero para comprarte flores amarillas...<br><br>
        pero hice esto para ti 💛<br><br>
        Porque eres alguien muy especial 🌼
    </p>

    <!-- FOTOS -->
    <div class="galeria">
        <img src="FOTO1.jpeg">
        <img src="FOTO2.jpeg">
        <img src="FOTO3.jpeg">
    </div>

    <audio id="musica" src="cancion.mp3"></audio>

    <p style="margin-top:20px; font-size:0.9em;">
        💛 Toca la pantalla para escuchar la canción
    </p>
</div>

<!-- FLORES -->
<div class="flower" style="left:10%;">🌼</div>
<div class="flower" style="left:30%; animation-delay:2s;">🌼</div>
<div class="flower" style="left:50%; animation-delay:4s;">🌼</div>
<div class="flower" style="left:70%; animation-delay:1s;">🌼</div>
<div class="flower" style="left:90%; animation-delay:3s;">🌼</div>

<!-- MÚSICA -->
<iframe id="player" width="0" height="0"
src=""
frameborder="0" allow="autoplay"></iframe>

<script>
function abrirCarta() {
    let sobre = document.querySelector(".sobre");

    sobre.classList.add("oculto");

    setTimeout(() => {
        sobre.style.display = "none";
        document.getElementById("contenido").style.display = "flex";
    }, 1000);

    // música
     // reproducir música
    let musica = document.getElementById("musica");
    musica.play();
}

</script>

</body>
</html>
