<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>

<style>
body {
    margin: 0;
    background: linear-gradient(to top, #fff9c4, #ffe082);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* SOBRE */
.sobre {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: linear-gradient(to top, #ffca28, #ffc107);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2em;
    font-weight: bold;
    cursor: pointer;
    z-index: 9999;
}

/* ANIMACIÓN DESAPARECER */
.oculto {
    animation: desaparecer 1s forwards;
}

@keyframes desaparecer {
    from { opacity: 1; }
    to { opacity: 0; }
}

/* CONTENIDO */
.contenido {
    display: none;
    height: 100vh;
    width: 100%;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
}

/* SLIDES */
.slide {
    display: none;
    animation: fade 1.5s;
}

.slide.activo {
    display: block;
}

/* TEXTO */
h1 {
    color: #ffb300;
    font-size: 2.5em;
}

p {
    font-size: 1.2em;
    color: #6d4c41;
    max-width: 400px;
}

/* IMÁGENES */
.imagen {
    width: 250px;
    height: 250px;
    object-fit: cover;
    border-radius: 15px;
}

/* FLORES */
.flower {
    position: absolute;
    font-size: 2em;
    animation: caer 10s linear infinite;
}

@keyframes caer {
    0% { transform: translateY(-100px); }
    100% { transform: translateY(100vh); }
}

/* FADE */
@keyframes fade {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>

</head>
<body>

<!-- SOBRE -->
<div class="sobre" onclick="abrirCarta()">
💌 Ábreme
</div>

<!-- CONTENIDO -->
<div class="contenido" id="contenido">

    <!-- TEXTO -->
    <div class="slide activo">
        <h1>🌼 Para ti 🌼</h1>
        <p>
            No tuve dinero para comprarte flores amarillas...<br><br>
            pero hice esto para ti 💛<br><br>
            Porque eres alguien muy especial 🌼<br><br>
            🌼💛TE AMO GUERITA HERTMOSA💛🌼
        </p>
    </div>

    <!-- IMAGEN 1 -->
    <div class="slide">
        <img src="FOTO1.jpeg" class="imagen">
    </div>

    <!-- IMAGEN 2 -->
    <div class="slide">
        <img src="FOTO2.jpeg" class="imagen">
    </div>

    <!-- IMAGEN 3 -->
    <div class="slide">
        <img src="FOTO3.jpeg" class="imagen">
    </div>

    <!-- AUDIO -->
    <audio id="musica" src="CANCION1.mp3" preload="auto" loop></audio>

</div>

<!-- FLORES -->
<div class="flower" style="left:10%;">🌼</div>
<div class="flower" style="left:30%; animation-delay:2s;">🌼</div>
<div class="flower" style="left:50%; animation-delay:4s;">🌼</div>
<div class="flower" style="left:70%; animation-delay:1s;">🌼</div>
<div class="flower" style="left:90%; animation-delay:3s;">🌼</div>

<script>
let index = 0;

function iniciarCarrusel() {
    let slides = document.querySelectorAll(".slide");

    setInterval(() => {
        slides[index].classList.remove("activo");

        index = (index + 1) % slides.length;

        slides[index].classList.add("activo");
    }, 3000);
}

function abrirCarta() {
    let sobre = document.querySelector(".sobre");

    sobre.classList.add("oculto");

    setTimeout(() => {
        sobre.style.display = "none";
        document.getElementById("contenido").style.display = "flex";
    }, 1000);

    // música
    let musica = document.getElementById("musica");
    musica.volume = 0.7;
    musica.play().catch(() => {});

    // carrusel
    iniciarCarrusel();
}
</script>

</body>
</html>
